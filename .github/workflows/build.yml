name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html
          if [ -f icon.png ]; then cp icon.png www/icon.png; fi

      - name: Install Capacitor
        run: |
          npm install @capacitor/core@5.7.4 @capacitor/cli@5.7.4 @capacitor/android@5.7.4

      - name: Create capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.g23.slowedreverb",
            "appName": "Slowed+Reverb",
            "webDir": "www",
            "server": { "androidScheme": "https" },
            "android": { "allowMixedContent": true }
          }
          EOF

      - name: Create package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "slowed-reverb",
            "version": "2.8.0",
            "dependencies": {
              "@capacitor/android": "5.7.4",
              "@capacitor/core": "5.7.4"
            }
          }
          EOF

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Set app icon
        run: |
          if [ -f icon.png ]; then
            for size in 48 72 96 144 192; do
              case $size in
                48)  dir="mdpi";;
                72)  dir="hdpi";;
                96)  dir="xhdpi";;
                144) dir="xxhdpi";;
                192) dir="xxxhdpi";;
              esac
              mkdir -p android/app/src/main/res/mipmap-$dir
              python3 -c "
from PIL import Image
img = Image.open('icon.png').resize(($size,$size), Image.LANCZOS)
img.save('android/app/src/main/res/mipmap-$dir/ic_launcher.png')
img.save('android/app/src/main/res/mipmap-$dir/ic_launcher_round.png')
"
            done
          fi

      - name: Fix Gradle version
        run: |
          cd android
          chmod +x gradlew
          ./gradlew wrapper --gradle-version=8.2.1 --distribution-type=all

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk "Slowed&Reverb.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Slowed-Reverb-v2.8
          path: "Slowed&Reverb.apk"
