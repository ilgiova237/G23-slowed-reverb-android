name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html
          if [ -f icon.png ]; then cp icon.png www/icon.png; fi

      - name: Install Capacitor
        run: |
          npm install @capacitor/core@5.7.4 @capacitor/cli@5.7.4 @capacitor/android@5.7.4

      - name: Create capacitor config
        run: |
          echo '{"appId":"com.g23.slowedreverb","appName":"SlowedReverb","webDir":"www","server":{"androidScheme":"https"},"android":{"allowMixedContent":true}}' > capacitor.config.json

      - name: Create package.json
        run: |
          echo '{"name":"slowed-reverb","version":"2.8.0","dependencies":{"@capacitor/android":"5.7.4","@capacitor/core":"5.7.4"}}' > package.json

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Set app icon
        run: |
          if [ -f icon.png ]; then
            pip install Pillow --break-system-packages -q
            python3 -c "
import os
from PIL import Image
sizes = {'mdpi':48,'hdpi':72,'xhdpi':96,'xxhdpi':144,'xxxhdpi':192}
for d,s in sizes.items():
    path = f'android/app/src/main/res/mipmap-{d}'
    os.makedirs(path, exist_ok=True)
    img = Image.open('icon.png').resize((s,s), Image.LANCZOS)
    img.save(f'{path}/ic_launcher.png')
    img.save(f'{path}/ic_launcher_round.png')
print('Icons set')
"
          fi

      - name: Fix Gradle version
        run: |
          cd android
          chmod +x gradlew
          ./gradlew wrapper --gradle-version=8.2.1 --distribution-type=all

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Package release
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/SlowedReverb.apk
          if [ -f README.md ]; then cp README.md release/README.md; fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SlowedReverb-v2.8
          path: release/
